<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente o tamanho do seu navegador</p>
    <picture>
        <source media="(min-width: 750px)" srcset="imagens/foto-p.png">
        <source media="(min-width: 1000px)" srcset="imagens/foto-m.png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Vamos aprender a reproduzir audios em html5.</h1>
   <audio src="midia/musica.mp3.mp3" controls autoplay></audio>
   

    </audio>
</body>
</html>
