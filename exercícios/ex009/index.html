<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com lista</h1>
    <h2>Lista compras mes que vem</h2>
    <ol type="a">
        <li>Acordar</li>
        <li>Tomar café</li>
        <li>ligar para joão</li>
        <li>escovar os dentes</li>
        <li>ir para o trabalho</li>
        <li>almoçar</li> 
    </ol>
    <h2>Lista não ordenas</h2>
    <ul type="circle">
        <li>pao</li>
        <li>manteiga</li>
        <li>tomate</li>
    </ul>
    

</body>
</html>
